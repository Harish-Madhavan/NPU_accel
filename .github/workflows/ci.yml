name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ./intel_npu_lib[dev]
        
    - name: Run linter
      run: |
        ruff check ./intel_npu_lib
        
    - name: Run tests
      run: |
        pytest ./intel_npu_lib/tests

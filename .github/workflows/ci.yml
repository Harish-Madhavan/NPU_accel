name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]
        python-version: ['3.11']
      fail-fast: false
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ninja pytest-xdist pytest-cov
        pip install -e "./intel_npu_lib[dev]"
        
    - name: Run linter
      run: |
        ruff check ./intel_npu_lib
        
    - name: Run tests
      run: |
        pytest -n auto --cov=intel_npu_acceleration ./intel_npu_lib/tests
